{% extends 'frontend/base.html' %}

{% block title %}Register | MediCore{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 500px;
        margin: 4rem auto;
        padding: 3rem;
        background: #111827;
        border-radius: 24px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .auth-title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
        text-align: center;
    }

    .auth-subtitle {
        color: #94a3b8;
        text-align: center;
        margin-bottom: 2rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: #cbd5e1;
    }

    .form-control {
        width: 100%;
        padding: 0.8rem 1rem;
        background: #1e293b;
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: white;
    }

    .role-selection {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
    }

    .role-card {
        flex: 1;
        padding: 1rem;
        background: #1e293b;
        border: 2px solid var(--glass-border);
        border-radius: 16px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
    }

    .role-card.active {
        border-color: var(--primary);
        background: rgba(0, 210, 255, 0.1);
    }

    .role-card i {
        font-size: 1.5rem;
        display: block;
        margin-bottom: 0.5rem;
    }

    .btn-block {
        width: 100%;
        text-align: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container animate-fade-in">
    <h2 class="auth-title">Create Account</h2>
    <p class="auth-subtitle">Join the future of healthcare today</p>
    
    <label style="display: block; text-align: center; margin-bottom: 1rem; color: #94a3b8;">Register as:</label>
    <div class="role-selection">
        <div class="role-card active" onclick="setRole('PATIENT', this)">
            <i>👤</i>
            Patient
        </div>
        <div class="role-card" onclick="setRole('DOCTOR', this)">
            <i>👨‍⚕️</i>
            Doctor
        </div>
    </div>

    <form id="registerForm">
        {% csrf_token %}
        <input type="hidden" name="role" id="roleInput" value="PATIENT">
        
        <div class="form-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" class="form-control" placeholder="John" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" class="form-control" placeholder="Doe" required>
            </div>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-control" placeholder="johndoe" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div id="errorMessage" style="color: var(--accent); margin-bottom: 1rem; text-align: center; display: none;"></div>
        <div id="successMessage" style="color: var(--primary); margin-bottom: 1rem; text-align: center; display: none;">Registration successful! Redirecting...</div>

        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Register</button>
    </form>
</div>

<script>
    function setRole(role, el) {
        document.getElementById('roleInput').value = role;
        document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    document.getElementById('registerForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const err = document.getElementById('errorMessage');
        const succ = document.getElementById('successMessage');
        
        btn.disabled = true;
        btn.innerText = 'Creating Account...';
        err.style.display = 'none';
        
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch('/api/users/register/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': data.csrfmiddlewaretoken
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                succ.style.display = 'block';
                setTimeout(() => {
                    window.location.href = '/login/?registered=true';
                }, 1500);
            } else {
                let msg = 'Registration failed: ';
                for (const key in result) {
                    msg += `${key}: ${result[key]} `;
                }
                err.innerText = msg;
                err.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Register';
            }
        } catch (error) {
            err.innerText = 'Connecting error. Please try again.';
            err.style.display = 'block';
            btn.disabled = false;
            btn.innerText = 'Register';
        }
    };
</script>
{% endblock %}
