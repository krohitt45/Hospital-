{% extends 'frontend/base.html' %}

{% block title %}Login | MediCore{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 450px;
        margin: 4rem auto;
        padding: 3rem;
        background: #111827;
        border-radius: 24px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .auth-title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
        text-align: center;
    }

    .auth-subtitle {
        color: #94a3b8;
        text-align: center;
        margin-bottom: 2rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: #cbd5e1;
    }

    .form-control {
        width: 100%;
        padding: 0.8rem 1rem;
        background: #1e293b;
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: white;
        transition: border-color 0.3s;
    }

    .form-control:focus {
        outline: none;
        border-color: var(--primary);
    }

    .btn-block {
        width: 100%;
        text-align: center;
        margin-top: 1rem;
    }

    .auth-footer {
        margin-top: 2rem;
        text-align: center;
        color: #94a3b8;
    }

    .auth-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container animate-fade-in">
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Log in to manage your medical records</p>
    
    <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="hospital_admin" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>

    <div class="auth-footer">
        Don't have an account? <a href="/register/">Sign Up</a>
    </div>
</div>

<script>
    // Simple logic for UI cleanup if needed later
</script>
{% endblock %}
