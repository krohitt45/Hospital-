{% extends 'frontend/base.html' %}

{% block title %}Book Appointment | MediCore{% endblock %}

{% block extra_css %}
<style>
    .book-container {
        max-width: 600px;
        margin: 4rem auto;
        padding: 3rem;
        background: #111827;
        border-radius: 24px;
        border: 1px solid var(--glass-border);
    }
    .form-group { margin-bottom: 1.5rem; }
    .form-control {
        width: 100%;
        padding: 0.8rem 1rem;
        background: #1e293b;
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: white;
    }
    .btn-block { width: 100%; }
</style>
{% endblock %}

{% block content %}
<div class="book-container animate-fade-in">
    <h2 style="text-align: center; margin-bottom: 2rem;">Book Appointment</h2>
    
    <form id="bookingForm">
        {% csrf_token %}
        <div class="form-group">
            <label>Select Doctor</label>
            <select name="doctor" class="form-control" required id="doctorSelect">
                {% for doctor in doctors %}
                    <option value="{{ doctor.id }}" {% if doctor_id == doctor.id|stringformat:"i" %}selected{% endif %}>
                        Dr. {{ doctor.user.get_full_name }} ({{ doctor.specialization }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Time</label>
                <input type="time" name="time" class="form-control" required>
            </div>
        </div>

        <div class="form-group">
            <label>Reason for Visit</label>
            <textarea name="reason" class="form-control" rows="3" placeholder="Symptoms, checkup, etc." required></textarea>
        </div>

        <div id="msg" style="text-align:center; margin-bottom:1rem; display:none;"></div>

        <button type="submit" class="btn btn-primary btn-block" id="bookBtn">Confirm Appointment</button>
    </form>
</div>

<script>
    document.getElementById('bookingForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('bookBtn');
        const msg = document.getElementById('msg');
        
        btn.disabled = true;
        btn.innerText = 'Booking...';
        
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch('/api/hospital/appointments/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': data.csrfmiddlewaretoken
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                msg.innerText = 'Appointment booked successfully!';
                msg.style.color = 'var(--primary)';
                msg.style.display = 'block';
                setTimeout(() => window.location.href = '/dashboard/', 1500);
            } else {
                const res = await response.json();
                msg.innerText = 'Failed: ' + JSON.stringify(res);
                msg.style.color = 'var(--accent)';
                msg.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Confirm Appointment';
            }
        } catch (error) {
            msg.innerText = 'Connection error.';
            msg.style.display = 'block';
            btn.disabled = false;
        }
    }
</script>
{% endblock %}
